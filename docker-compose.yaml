services:
  portal:
    build:
      context: .
      args:
        - VITE_API_URL=https://portal.ajanstek.com/api
    image: portal-app
    container_name: portal-app
    environment:
      - PORT=3000
      - NODE_ENV=production
      - CHROME_PATH=/usr/bin/google-chrome-stable
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - PORTAL_URL=https://portal.ajanstek.com
    volumes:
      - ./data:/app/data
      - ./public/screenshots:/app/public/screenshots
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: always
